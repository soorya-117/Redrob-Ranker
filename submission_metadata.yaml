ai_tools_used:
  - "Claude"

ai_usage_summary: |
  Used Claude (claude.ai) throughout development: architecture discussion,
  drafting and reviewing the scoring modules, calibrating honeypot checks
  against the sample data, and test design. All design decisions (weighting,
  penalty structure, trap handling) were reviewed, understood and owned by me;
  I can defend every component. No candidate data was sent to any hosted LLM,
  and the ranking step itself makes no LLM or network calls.

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  Hybrid semantic + structural ranker. Pre-computation: all-MiniLM-L6-v2
  embeddings (CPU) of a narrative-weighted candidate document (summary +
  recent role descriptions; skills only if used >= 6 months) and of the JD.
  Ranking (< 5 min, numpy only): final = (0.40 x semantic + 0.60 x structural)
  x behavioral multiplier x integrity multiplier. Structural encodes the JD's
  explicit rules: title/domain fit, career evidence of shipped
  retrieval/ranking systems, 5-9y experience band, trust-weighted JD-skill
  coverage (endorsements + duration, so stuffed lists score ~0), and
  logistics — plus penalties for the JD's named disqualifiers
  (consulting-only, research-only, title-chasers, CV-only, stale hands-on,
  keyword stuffers). Behavioral signals act multiplicatively (activity
  recency, response rate, open-to-work, interview completion) so an
  unreachable candidate can't be rescued by a perfect profile. An integrity
  module hard-flags arithmetically impossible profiles (claimed experience
  exceeding observable career span, stated durations contradicting dates,
  3+ "expert" skills with zero usage) — calibrated on the sample to a 0%
  false-positive rate — pushing honeypots out of the top 100. Reasoning is
  template-driven from computed profile facts only: deterministic pattern
  rotation, mandatory concerns, rank-consistent tone.

